{{ define "main" }}
<section class="page-hero">
  <div class="container slim">
    <p class="eyebrow">{{ with .Params.eyebrow }}{{ . }}{{ else }}Scutiva OSS{{ end }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-intro">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="section-block page-content">
  <div class="container slim prose-shell">
    {{ .Content }}
  </div>
</section>
{{ end }}
