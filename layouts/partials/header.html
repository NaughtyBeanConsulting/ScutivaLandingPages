<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ .Site.Home.RelPermalink }}">
      <img src="{{ "img/Scutiva1024x1024.png" | relURL }}" alt="Scutiva logo" class="brand-logo">
      <div>
        <span class="brand-name">Scutiva</span>
        <span class="brand-tag">Open-source security operations</span>
      </div>
    </a>
    <nav class="main-nav" aria-label="Primary">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="header-actions">
      <a class="button ghost" href="{{ .Site.Params.githubRepo }}">GitHub</a>
      <a class="button coffee" href="{{ .Site.Params.donationLink }}">
        <img src="{{ "img/Naughty Bean Coffee-05.png" | relURL }}" alt="Naughty Bean Coffee logo">
        <span>Buy Me A Naughty Bean Coffee</span>
      </a>
    </div>
  </div>
</header>
